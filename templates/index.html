<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithm Complexity Comparator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="glass-panel" style="margin-top: 2rem; margin-bottom: 2rem; text-align: center;">
        <h1 class="text-gradient">Algorithm Complexity Comparator</h1>
        <p class="text-secondary" style="margin-top: 0.5rem;">Interactive UI to measure and compare Time Complexities</p>
    </header>

    <div id="error-toast" style="display: none; background: rgba(239, 68, 68, 0.2); border: 1px solid rgb(239, 68, 68); color: #fca5a5; padding: 1rem; border-radius: 8px; margin-bottom: 2rem; text-align: center; width: 100%; max-width: 800px;">
        <span id="error-message"></span>
    </div>

    <main style="width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 2rem;">
        
        <!-- Search Algorithms Section -->
        <section class="glass-panel" id="search-section">
            <h2>Linear vs Binary Search</h2>
            <p class="text-secondary" style="margin-bottom: 1.5rem;">Compare O(N) vs O(log N) time complexities.</p>
            
            <form id="search-form" style="display: flex; flex-direction: column; gap: 1rem;">
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label for="array-input">Dataset (Comma separated numbers)</label>
                        <button type="button" id="search-generate-btn" style="background: none; border: 1px solid var(--accent-blue); color: var(--text-primary); padding: 0.3rem 0.6rem; border-radius: 4px; cursor: pointer; font-size: 0.8rem;">Auto-Generate Large Array</button>
                    </div>
                    <textarea id="array-input" rows="3" placeholder="e.g. 10, 20, 30, 40, 50" style="padding: 0.8rem; border-radius: 8px; border: none; outline: none; background: rgba(255,255,255,0.9); font-family: inherit; resize: vertical;" required></textarea>
                </div>
                
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label for="target-input">Target Number to Find</label>
                    <input type="number" id="target-input" placeholder="e.g. 30" style="padding: 0.8rem; border-radius: 8px; border: none; outline: none; background: rgba(255,255,255,0.9); font-family: inherit;" required>
                </div>
                
                <button type="submit" style="padding: 1rem; border-radius: 8px; border: none; background: var(--accent-blue); color: white; font-weight: bold; cursor: pointer; transition: background 0.3s;">Compare Search Algorithms</button>
            </form>

            <div id="search-results" style="margin-top: 2rem; display: none;">
                <!-- Results will be injected here via JS -->
            </div>
        </section>

        <!-- Subset Checking Section -->
        <section class="glass-panel" id="subset-section">
            <h2>List vs Set Subset Checking</h2>
            <p class="text-secondary" style="margin-bottom: 1.5rem;">Compare O(N * M) vs O(N + M) time complexities.</p>
            
            <form id="subset-form" style="display: flex; flex-direction: column; gap: 1rem;">
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label for="collection-a-input">Collection A (Comma separated numbers)</label>
                    <textarea id="collection-a-input" rows="2" placeholder="e.g. 10, 20" style="padding: 0.8rem; border-radius: 8px; border: none; outline: none; background: rgba(255,255,255,0.9); font-family: inherit; resize: vertical;" required></textarea>
                </div>
                
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label for="collection-b-input">Collection B (Comma separated numbers)</label>
                        <button type="button" id="subset-generate-btn" style="background: none; border: 1px solid var(--accent-purple); color: var(--text-primary); padding: 0.3rem 0.6rem; border-radius: 4px; cursor: pointer; font-size: 0.8rem;">Auto-Generate Large Collections</button>
                    </div>
                    <textarea id="collection-b-input" rows="3" placeholder="e.g. 10, 20, 30, 40, 50" style="padding: 0.8rem; border-radius: 8px; border: none; outline: none; background: rgba(255,255,255,0.9); font-family: inherit; resize: vertical;" required></textarea>
                </div>
                
                <button type="submit" style="padding: 1rem; border-radius: 8px; border: none; background: var(--accent-purple); color: white; font-weight: bold; cursor: pointer; transition: background 0.3s;">Compare Subset Algorithms</button>
            </form>

            <div id="subset-results" style="margin-top: 2rem; display: none;">
                <!-- Results will be injected here via JS -->
            </div>
        </section>

    </main>
    
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
